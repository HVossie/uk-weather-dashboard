name: Daily Weather Pipeline

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

jobs:
  run-weather-pipeline:
    runs-on: ubuntu-latest

    env:
      OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
      WEATHERAPI_KEY: ${{ secrets.WEATHERAPI_KEY }}
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Create service account key file
        run: |
          echo '${{ secrets.GCP_SA_KEY }}' > "${RUNNER_TEMP}/gcp-key.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=${RUNNER_TEMP}/gcp-key.json" >> $GITHUB_ENV

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install meltano
          if [ -s requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Install Meltano plugins
        run: meltano install

      - name: Run weather pipelines with retries
        shell: bash
        run: |
          retry() {
            local cmd="$1"
            local attempts=3
            local delay=20

            for ((i=1; i<=attempts; i++)); do
              echo "Attempt $i: $cmd"
              if eval "$cmd"; then
                return 0
              fi
              if [ "$i" -lt "$attempts" ]; then
                echo "Command failed. Retrying in ${delay}s..."
                sleep "$delay"
              fi
            done

            echo "Command failed after $attempts attempts."
            return 1
          }

          retry "meltano run tap-rest-api-msdk target-bigquery"
          retry "meltano run tap-openweather target-bigquery"
          retry "meltano run tap-weatherapi target-bigquery"