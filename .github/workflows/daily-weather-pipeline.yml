name: Daily Weather Pipeline

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

jobs:
  run-weather-pipeline:
    runs-on: ubuntu-latest

    env:
      OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
      WEATHERAPI_KEY: ${{ secrets.WEATHERAPI_KEY }}
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Create service account key file
        run: |
          echo '${{ secrets.GCP_SA_KEY }}' > "${RUNNER_TEMP}/gcp-key.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=${RUNNER_TEMP}/gcp-key.json" >> $GITHUB_ENV

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Meltano plugins
        run: |
          meltano install

      - name: Run Open-Meteo pipeline
        run: |
          meltano run tap-rest-api-msdk target-bigquery

      - name: Run OpenWeather pipeline
        run: |
          meltano run tap-openweather target-bigquery

      - name: Run WeatherAPI pipeline
        run: |
          meltano run tap-weatherapi target-bigquery